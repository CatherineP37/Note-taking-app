<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note taking app</title>
    <link rel="stylesheet" href="assets/css/style.css">
    
</head>
<body>
   
    <main>
        <header>
            <h1>Notes</h1>
            <button class="add-button" onclick="openModal()">ADD NOTE</button>
            <section id = "modal">
                <button onclick = "closeModal()">CLOSE</button>
                <label for="note_input" class="input-label" id="modalTitle"></label>               
                <input type="text" id="note_input">                
                <button id="save_button" onclick="saveNote()"></button>
            </section>
             <section class = "edit-modal">
                <button onclick = "closeModal()">CLOSE</button>
                <label for="note_input" class="input-label" id="modalTitle"></label>               
                <input type="text" id="note_input">                
                <button id="save_button" onclick="saveNote()"></button>
            </section>
                     
        </header>
        
        <ul id="note_list">

        </ul>        
    </main>
				
	<script src="assets/js/script.js"></script>
</body>
</html>
