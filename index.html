<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note taking app</title>
    <link rel="stylesheet" href="assets/css/style.css">
    
</head>
<body>
   
    <main>
        <header>
            <h1>Notes</h1>
            <form class="add-note">
                <div>
                    <label for="note_title">Add your note title</label>               
                    <input type="text" id="note_title">
                </div>
                  <div>
                    <label for="note_content">Add your note</label>               
                    <textarea id="note_content"></textarea>
                </div>
                               
                <button class="add-button" onclick="addNote()">ADD NOTE</button>
            </form>
        </header>
        <section id="note_list">

        </section>        
              
    </main>
				
	<script src="assets/js/script.js"></script>
</body>
</html>
